library_root: "$HOME/photo-ro"
work_dir: work
db_path: dundee.sqlite
temp_dir: /tmp/dundee
parallel: 4
extensions:
- jpg
- jpeg
- jpe
- png
- gif
- bmp
- tif
- tiff
- webp
- heic
- heif
- avif
- cr2
- cr3
- nef
- nrw
- arw
- sr2
- srf
- raf
- rw2
- orf
- dng
- pef
- raw
- x3f
- 3fr
- erf
- kdc
- mef
- mos
- iiq
cruft:
- '@eaDir'
- '#recycle'
- '#snapshot'
- '@tmp'
- .@__thumb
- '@sharebin'
- .DS_Store
- Thumbs.db
- .Spotlight-V100
- .TemporaryItems
- .Trashes
- .fseventsd
fingerprint_grid: 8
hamming_threshold: 5
lsh_bands: 8
preference_rules:
- max_pixels
- max_filesize
- max_meta
- oldest_capture
folder_priority: []
ssh_host: synology.local
ssh_user: admin
nas_root: /volume1/photo
preferred_root: /volume1/photo/_dedup/preferred
nonpreferred_root: /volume1/photo/_dedup/non-preferred

